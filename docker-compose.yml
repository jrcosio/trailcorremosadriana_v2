services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
      - "8000"
    volumes:
      - trailcorremosadriana_v2:/app/.reflex
    networks:
      webnet:
        ipv4_address: 172.20.0.10

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      webnet:
        ipv4_address: 172.20.0.11

volumes:
  trailcorremosadriana_v2:
  caddy_data:
  caddy_config:

networks:
  webnet:
    ipam:
      config:
        - subnet: 172.20.0.0/24